 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChantierPro — Galerie Client</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root { --orange:#E8651A; --dark:#1A1814; --dark2:#2C2820; --sand:#C8B89A; --cream:#F8F4EE; --success:#4CAF82; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--cream); min-height:100vh; }
  header { background:var(--dark2); padding:16px 20px; border-bottom:1px solid rgba(200,184,154,0.15); }
  .logo { font-family:'DM Serif Display',serif; font-size:20px; color:var(--orange); }
  .logo span { color:var(--sand); font-style:italic; }

  /* ── MOT DE PASSE ── */
  .pwd-screen { position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px; }
  .pwd-box { background:var(--dark2); border:1px solid rgba(200,184,154,0.2); border-radius:20px; padding:36px 28px; max-width:340px; width:100%; text-align:center; }
  .pwd-logo { font-family:'DM Serif Display',serif; font-size:28px; color:var(--orange); margin-bottom:16px; }
  .pwd-logo span { color:var(--sand); font-style:italic; }
  .pwd-icon { font-size:40px; margin-bottom:12px; }
  .pwd-title { font-size:17px; font-weight:600; color:var(--cream); margin-bottom:6px; }
  .pwd-sub { font-size:13px; color:var(--sand); margin-bottom:24px; }
  .pwd-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(200,184,154,0.2); border-radius:10px; padding:14px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:20px; text-align:center; outline:none; letter-spacing:6px; margin-bottom:10px; transition:border-color 0.2s; }
  .pwd-input:focus { border-color:var(--orange); }
  .pwd-input.shake { animation:shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .pwd-error { color:#E84545; font-size:12px; margin-bottom:12px; min-height:18px; }
  .pwd-btn { width:100%; background:var(--orange); border:none; border-radius:10px; padding:13px; color:white; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:background 0.2s; }
  .pwd-btn:hover { background:#F4894A; }

  /* ── GALERIE ── */
  .hero { padding:28px 20px 14px; max-width:960px; margin:0 auto; }
  h1 { font-family:'DM Serif Display',serif; font-size:26px; color:var(--cream); margin-bottom:4px; }
  .subtitle { color:var(--sand); font-size:13px; margin-bottom:12px; }
  .badges { display:flex; gap:8px; flex-wrap:wrap; }
  .badge { background:rgba(232,101,26,0.1); color:var(--orange); border:1px solid rgba(232,101,26,0.2); padding:4px 12px; border-radius:20px; font-size:12px; }
  .status-badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; margin-left:8px; }
  .status-encours { background:rgba(232,101,26,0.15); color:var(--orange); }
  .status-termine { background:rgba(76,175,130,0.15); color:var(--success); }
  .status-attente { background:rgba(200,184,154,0.15); color:var(--sand); }
  .status-pause { background:rgba(232,69,69,0.15); color:#E84545; }

  .section { max-width:960px; margin:0 auto; padding:0 20px 28px; }
  .section-label { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--orange); margin:24px 0 12px; }

  /* PHOTOS */
  .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }
  .photo-item { border-radius:12px; overflow:hidden; background:rgba(255,255,255,0.05); border:1px solid rgba(200,184,154,0.1); }
  .photo-item img { width:100%; aspect-ratio:1; object-fit:cover; display:block; cursor:pointer; transition:transform 0.2s; }
  .photo-item img:hover { transform:scale(1.03); }
  .photo-actions { display:flex; gap:6px; padding:7px; }
  .btn-view { flex:1; background:rgba(200,184,154,0.1); border:none; border-radius:7px; padding:7px; color:var(--sand); font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .btn-dl { flex:1; background:var(--orange); border:none; border-radius:7px; padding:7px; color:white; font-size:12px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .btn-dl:disabled { opacity:0.6; }

  /* PDFs */
  .pdf-item { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(200,184,154,0.1); border-radius:10px; padding:12px; margin-bottom:8px; }
  .pdf-name { flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .btn-pdf { background:var(--orange); color:white; padding:8px 14px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; white-space:nowrap; text-decoration:none; display:inline-block; }

  /* NOTES */
  .note-item { background:rgba(255,255,255,0.04); border:1px solid rgba(200,184,154,0.1); border-radius:10px; padding:12px; margin-bottom:8px; }
  .note-date { font-size:10px; color:var(--sand); margin-bottom:5px; }
  .note-text { font-size:13px; line-height:1.6; white-space:pre-wrap; }

  /* TACHES */
  .tache-progress { background:rgba(255,255,255,0.05); border-radius:4px; height:5px; margin-bottom:12px; overflow:hidden; }
  .tache-bar { height:100%; background:var(--success); border-radius:4px; }
  .tache-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(200,184,154,0.08); }
  .tache-check { width:18px; height:18px; border-radius:50%; border:2px solid rgba(200,184,154,0.3); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; }
  .tache-check.done { background:var(--success); border-color:var(--success); color:white; }
  .tache-label { font-size:13px; }
  .tache-label.done { text-decoration:line-through; color:var(--sand); }

  /* LIGHTBOX */
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:1000; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:16px; }
  .lightbox.show { display:flex; }
  .lightbox img { max-width:100%; max-height:75vh; object-fit:contain; border-radius:8px; }
  .lightbox-close { position:absolute; top:14px; right:14px; color:white; font-size:22px; cursor:pointer; background:rgba(255,255,255,0.15); border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; border:none; }
  .lightbox-dl { background:var(--orange); color:white; padding:11px 22px; border-radius:10px; font-size:14px; font-weight:600; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; }

  /* LOADER & TOAST */
  .loader-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:14px; color:var(--sand); }
  .spinner { width:40px; height:40px; border:3px solid rgba(232,101,26,0.2); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-box { text-align:center; padding:50px 20px; color:var(--sand); }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark2); border:1px solid rgba(200,184,154,0.2); border-radius:10px; padding:10px 18px; color:var(--cream); font-size:13px; z-index:2000; transition:transform 0.3s; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @media(max-width:600px) { .photo-grid{grid-template-columns:repeat(2,1fr);} .hero,.section{padding-left:14px;padding-right:14px;} }
</style>
</head>
<body>

<header><div class="logo">Chantier<span>Pro</span></div></header>

<!-- ECRAN MOT DE PASSE -->
<div class="pwd-screen" id="pwd-screen">
  <div class="pwd-box">
    <div class="pwd-logo">Chantier<span>Pro</span></div>
    <div class="pwd-icon">🔒</div>
    <div class="pwd-title" id="pwd-nom">Galerie sécurisée</div>
    <div class="pwd-sub">Entrez le code d'accès fourni par votre prestataire</div>
    <input class="pwd-input" type="password" id="pwd-input" placeholder="••••" maxlength="20"
      onkeydown="if(event.key==='Enter')verifierPwd()">
    <div class="pwd-error" id="pwd-error"></div>
    <button class="pwd-btn" onclick="verifierPwd()">🔓 Accéder à la galerie</button>
  </div>
</div>

<!-- GALERIE -->
<div id="app" style="display:none;">
  <div class="loader-page"><div class="spinner"></div><div>Chargement...</div></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-dl" onclick="telecharger(currentUrl,currentName);event.stopPropagation()">⬇ Télécharger</button>
</div>

<div class="toast" id="toast"></div>

<script>
const JSONBIN_KEY = '$2a$10$nEXjNGx96Wh6f9zC4p145OmJ.ux/yVXbLEG5owWYJdSVNL/vI4bgO';
let chantierData = null;
let currentUrl = '', currentName = '';

function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── MOT DE PASSE ──
function verifierPwd() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if(!chantierData) return;

  // Si pas de mot de passe défini sur ce chantier — accès libre
  if(!chantierData.pwdClient || chantierData.pwdClient === '') {
    ouvrirGalerie();
    return;
  }

  if(pwd === chantierData.pwdClient) {
    ouvrirGalerie();
  } else {
    const input = document.getElementById('pwd-input');
    const error = document.getElementById('pwd-error');
    error.textContent = '❌ Code incorrect, réessayez';
    input.classList.add('shake');
    input.value = '';
    setTimeout(()=>{ input.classList.remove('shake'); error.textContent=''; }, 1500);
  }
}

function ouvrirGalerie() {
  document.getElementById('pwd-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderGallery(chantierData);
}

// ── CHARGEMENT ──
async function init() {
  const params = new URLSearchParams(window.location.search);
  const binId = params.get('bin');
  const chantierId = window.location.hash.replace('#','').trim();

  if(!binId || !chantierId) {
    document.getElementById('pwd-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('app').innerHTML = '<div class="error-box"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><p>Lien invalide.<br>Scannez à nouveau le QR code.</p></div>';
    return;
  }

  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest', {
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    const d = await r.json();
    const chantiers = d.record || [];
    const c = chantiers.find(x=>x.id===chantierId);
    if(!c) throw new Error('Chantier introuvable');

    chantierData = c;

    // Affiche le nom du chantier sur l écran de connexion
    document.getElementById('pwd-nom').textContent = c.nom;

    // Si pas de mot de passe — ouvre directement
    if(!c.pwdClient || c.pwdClient === '') {
      ouvrirGalerie();
    }
    // Sinon attend que le client entre le code

  } catch(e) {
    document.getElementById('pwd-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('app').innerHTML = '<div class="error-box"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><p>Impossible de charger ce chantier.<br>Vérifiez votre connexion.</p></div>';
  }
}

// ── GALERIE ──
function statutLabel(s) {
  const m={encours:'🔨 En cours',attente:'⏳ En attente',pause:'⏸ En pause',termine:'✅ Terminé'};
  return m[s]||'🔨 En cours';
}

function renderGallery(c) {
  const photos = c.photos||[];
  const pdfs   = c.pdfs||[];
  const notes  = c.notes||[];
  const taches = c.taches||[];
  const done   = taches.filter(t=>t.done).length;
  const pct    = taches.length?Math.round(done/taches.length*100):0;

  const photosHtml = photos.length ? `
    <div class="section-label">📸 Photos (${photos.length})</div>
    <div class="photo-grid">
      ${photos.map((p,i)=>{
        const nom=p.name||('photo_'+(i+1)+'.jpg');
        return `<div class="photo-item">
          <img src="${p.url}" loading="lazy" onclick="openLightbox('${p.url}','${nom}')">
          <div class="photo-actions">
            <button class="btn-view" onclick="openLightbox('${p.url}','${nom}')">🔍 Voir</button>
            <button class="btn-dl" onclick="telecharger('${p.url}','${nom}')">⬇ Sauver</button>
          </div>
        </div>`;
      }).join('')}
    </div>` : '';

  const pdfsHtml = pdfs.length ? `
    <div class="section-label">📄 Documents (${pdfs.length})</div>
    ${pdfs.map(p=>`
      <div class="pdf-item">
        <span style="font-size:24px;">📋</span>
        <div class="pdf-name">${p.name}</div>
        <a href="${p.viewUrl||p.url}" target="_blank" class="btn-pdf">👁 Voir</a>
      </div>`).join('')}` : '';

  const notesHtml = notes.length ? `
    <div class="section-label">📝 Notes (${notes.length})</div>
    ${notes.map(n=>`
      <div class="note-item">
        <div class="note-date">📅 ${new Date(n.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        <div class="note-text">${n.text}</div>
      </div>`).join('')}` : '';

  const tachesHtml = taches.length ? `
    <div class="section-label">✅ Avancement (${done}/${taches.length})</div>
    <div class="tache-progress"><div class="tache-bar" style="width:${pct}%"></div></div>
    ${taches.map(t=>`
      <div class="tache-item">
        <div class="tache-check ${t.done?'done':''}">${t.done?'✓':''}</div>
        <div class="tache-label ${t.done?'done':''}">${t.text}</div>
      </div>`).join('')}` : '';

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <h1>${c.nom} <span class="status-badge status-${c.statut||'encours'}">${statutLabel(c.statut)}</span></h1>
      <div class="subtitle">👤 ${c.client}${c.adresse?' &nbsp;•&nbsp; 📍 '+c.adresse:''}</div>
      <div class="badges">
        <span class="badge">📸 ${photos.length} photo(s)</span>
        <span class="badge">📄 ${pdfs.length} document(s)</span>
        <span class="badge">✅ ${done}/${taches.length} tâches</span>
      </div>
    </div>
    <div class="section">
      ${photosHtml}${pdfsHtml}${tachesHtml}${notesHtml}
      ${!photos.length&&!pdfs.length&&!notes.length&&!taches.length?'<div class="error-box"><div style="font-size:40px;margin-bottom:12px;">📭</div><p>Aucun contenu disponible.</p></div>':''}
    </div>`;
}

// ── TELECHARGEMENT ──
async function telecharger(url, nom) {
  try {
    showToast('⏳ Téléchargement...');
    const r = await fetch(url);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nom || 'photo.jpg';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('✅ Téléchargé !');
  } catch(e) {
    window.open(url,'_blank');
    showToast('📂 Ouvert dans le navigateur');
  }
}

function openLightbox(url, nom) {
  currentUrl=url; currentName=nom;
  document.getElementById('lightbox-img').src=url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

init();
</script>
</body>
</html>
